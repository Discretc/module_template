<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Module Outline Generator – MPU</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      background: linear-gradient(135deg, #178656 0%, #2b9451 100%);
      color: #fff;
      padding: 1.5rem 2rem;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 600; }
    header p  { font-size: 0.875rem; opacity: 0.85; margin-top: 0.25rem; }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 720px;
      margin: 2rem auto;
      padding: 2rem;
    }
    .card h2 {
      font-size: 1.05rem;
      margin-bottom: 1rem;
      color: #1e3a5f;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.5rem;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    select {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 0.92rem;
      background: #fff;
      transition: border 0.15s;
    }
    select:focus {
      outline: none;
      border-color: #2d5a8e;
      box-shadow: 0 0 0 3px rgba(45,90,142,0.15);
    }
    select:disabled { background: #f1f5f9; color: #94a3b8; }
    .field       { margin-bottom: 1rem; }
    .field-row   { display: flex; gap: 1rem; }
    .field-row > .field { flex: 1; }
    .summary {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      color: #475569;
      margin-bottom: 1rem;
      min-height: 2.4em;
    }
    .summary strong { color: #1e293b; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #178656; color: #fff; }
    .btn-primary:hover { background: #136b44; }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .status { font-size: 0.85rem; margin-top: 0.75rem; min-height: 1.2em; }
    .status.error   { color: #dc2626; }
    .status.success { color: #16a34a; }
    footer {
      margin-top: auto;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Module Outline Generator</h1>
  <p>Macao Polytechnic University – Internal Tool</p>
</header>

<div class="card">

  <!-- Step 1: Global settings -->
  <h2>1 &ensp; Academic Year &amp; Semester</h2>
  <div class="field-row">
    <div class="field">
      <label for="academic-year">Academic Year</label>
      <select id="academic-year">
        <option value="2025/2026" selected>2025/2026</option>
        <option value="2026/2027">2026/2027</option>
        <option value="2024/2025">2024/2025</option>
      </select>
    </div>
    <div class="field">
      <label for="semester">Semester</label>
      <select id="semester">
        <option value="">-- select --</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    </div>
  </div>

  <!-- Step 2: Cascading selection -->
  <h2>2 &ensp; Select Scope</h2>

  <div class="field">
    <label for="sel-faculty">Faculty</label>
    <select id="sel-faculty">
      <option value="">-- select faculty --</option>
    </select>
  </div>

  <div class="field">
    <label for="sel-programme">Programme (optional — leave blank for entire faculty)</label>
    <select id="sel-programme" disabled>
      <option value="">-- all programmes --</option>
    </select>
  </div>

  <div class="field">
    <label for="sel-class">Class / Module (optional — leave blank for entire programme)</label>
    <select id="sel-class" disabled>
      <option value="">-- all classes --</option>
    </select>
  </div>

  <!-- Summary -->
  <div class="summary" id="summary">Select a faculty to begin.</div>

  <!-- Step 3: Generate -->
  <h2>3 &ensp; Generate Templates (EN + ZH + PT)</h2>
  <button id="btn-generate" class="btn btn-primary" disabled>
    Download Module Outlines (.zip)
  </button>
  <div id="status" class="status"></div>
</div>

<footer>Module Outline Generator &copy; 2026 Macao Polytechnic University</footer>

<script>
  const selFaculty    = document.getElementById("sel-faculty");
  const selProgramme  = document.getElementById("sel-programme");
  const selClass      = document.getElementById("sel-class");
  const summaryEl     = document.getElementById("summary");
  const btnGenerate   = document.getElementById("btn-generate");
  const statusEl      = document.getElementById("status");

  let allClasses = []; // classes currently loaded for counting

  // ── Load faculties on start ────────────────────────────────────────
  (async () => {
    const res = await fetch("/api/faculties");
    const data = await res.json();
    data.forEach(f => {
      const opt = document.createElement("option");
      opt.value = f.id;
      opt.textContent = `${f.code} – ${f.name_en}`;
      selFaculty.appendChild(opt);
    });
  })();

  // ── Faculty change → load programmes ───────────────────────────────
  selFaculty.addEventListener("change", async () => {
    const fid = selFaculty.value;
    resetSelect(selProgramme, "-- all programmes --");
    resetSelect(selClass, "-- all classes --");
    allClasses = [];

    if (!fid) {
      selProgramme.disabled = true;
      selClass.disabled = true;
      updateSummary();
      return;
    }

    const res = await fetch(`/api/programmes?faculty_id=${fid}`);
    const data = await res.json();
    data.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.id;
      const deg = p.degree_level.charAt(0).toUpperCase() + p.degree_level.slice(1);
      opt.textContent = `${p.code} – ${p.name_en} (${deg})`;
      selProgramme.appendChild(opt);
    });
    selProgramme.disabled = false;

    // Load all classes for this faculty (for counting)
    await loadClasses(`faculty_id=${fid}`);
    updateSummary();
  });

  // ── Programme change → load classes ────────────────────────────────
  selProgramme.addEventListener("change", async () => {
    const pid = selProgramme.value;
    resetSelect(selClass, "-- all classes --");

    if (!pid) {
      selClass.disabled = true;
      await loadClasses(`faculty_id=${selFaculty.value}`);
      updateSummary();
      return;
    }

    await loadClasses(`programme_id=${pid}`);
    selClass.disabled = false;
    updateSummary();
  });

  // ── Class change ───────────────────────────────────────────────────
  selClass.addEventListener("change", () => updateSummary());

  // ── Helpers ────────────────────────────────────────────────────────
  function resetSelect(sel, placeholder) {
    sel.innerHTML = "";
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = placeholder;
    sel.appendChild(opt);
  }

  async function loadClasses(query) {
    const res = await fetch(`/api/classes?${query}`);
    allClasses = await res.json();
    allClasses.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.id;
      const name = c.module_name_en || c.module_name_zh || c.class_code;
      opt.textContent = `${c.class_code} – ${name} (${c.instructor_en || ""})`;
      selClass.appendChild(opt);
    });
  }

  function updateSummary() {
    statusEl.textContent = "";
    const fid = selFaculty.value;
    const pid = selProgramme.value;
    const cid = selClass.value;

    if (!fid) {
      summaryEl.innerHTML = "Select a faculty to begin.";
      btnGenerate.disabled = true;
      return;
    }

    let count;
    if (cid) {
      count = 1;
    } else {
      count = allClasses.length;
    }

    const scope = cid
      ? "1 selected class"
      : pid
        ? `all <strong>${count}</strong> class(es) in this programme`
        : `all <strong>${count}</strong> class(es) in this faculty`;

    summaryEl.innerHTML = `Will generate <strong>${count * 3}</strong> files (${scope} &times; 3 languages).`;
    btnGenerate.disabled = false;
  }

  // ── Generate ───────────────────────────────────────────────────────
  btnGenerate.addEventListener("click", async () => {
    const fid = selFaculty.value;
    const pid = selProgramme.value;
    const cid = selClass.value;

    if (!fid) return;

    const body = {
      academic_year: document.getElementById("academic-year").value,
      semester: document.getElementById("semester").value,
    };

    if (cid) {
      body.class_ids = [parseInt(cid)];
    } else if (pid) {
      body.programme_id = parseInt(pid);
    } else {
      body.faculty_id = parseInt(fid);
    }

    statusEl.textContent = "Generating...";
    statusEl.className = "status";
    btnGenerate.disabled = true;

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || "Generation failed");
      }

      const blob = await res.blob();
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "Module_Outlines.zip";
      a.click();
      URL.revokeObjectURL(a.href);

      statusEl.textContent = "Download complete. Files also saved in the output/ folder on the server.";
      statusEl.className = "status success";
    } catch (err) {
      statusEl.textContent = err.message || "Error generating documents.";
      statusEl.className = "status error";
    } finally {
      btnGenerate.disabled = false;
    }
  });
</script>

</body>
</html>
